name: PR Check

# Lightweight gate for pull requests: static analysis + an unsigned compile per
# desktop platform. No signing, no packaging (msix/installer), no release/VirusTotal —
# those live in desktop-builds.yml and run on tags. This just proves the tree analyzes
# clean (no new warnings/errors) and still builds.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Warm the SDK/pub caches in master's scope (see warm-cache job below).
  push:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs when a PR is pushed again.
concurrency:
  group: pr-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Matches the pin in windows/build.ps1 and linux/build.sh.
  FLUTTER_VERSION: "3.44.6"

jobs:
  # Populate the SDK + pub caches in master's scope on every merge. PR runs can only
  # restore caches from their own ref or the base branch (master); without this job
  # that shared scope stays empty and each PR redownloads the SDK. Just installs the
  # SDK and resolves packages — no compile — so it's cheap.
  warm-cache:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            pub_path: ~/.pub-cache
          - runner: ubuntu-24.04-arm
            pub_path: ~/.pub-cache
          - runner: windows-latest
            pub_path: ~/AppData/Local/Pub/Cache
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install fvm (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL https://fvm.app/install.sh | bash
          echo "$HOME/fvm/bin" >> "$GITHUB_PATH"

      - name: Install fvm (Windows)
        if: runner.os == 'Windows'
        run: choco install fvm -y

      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v5
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ${{ matrix.pub_path }}
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      - name: Select Flutter version
        run: fvm use "$FLUTTER_VERSION" --force
        shell: bash

      - name: Pub get
        run: fvm flutter pub get --enforce-lockfile
        shell: bash

  analyze:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install fvm
        run: |
          curl -fsSL https://fvm.app/install.sh | bash
          echo "$HOME/fvm/bin" >> "$GITHUB_PATH"

      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v5
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      - name: Select Flutter version
        run: fvm use "$FLUTTER_VERSION" --force

      - name: Pub get
        run: fvm flutter pub get --enforce-lockfile

      - name: Write .env
        run: echo "KLIPY_API_KEY=" > .env
        shell: bash

      # --no-fatal-infos: the codebase carries ~270 pre-existing info-level lints
      # (deprecations, use_build_context_synchronously). Fail only on new
      # warnings/errors a PR introduces, not on that legacy baseline.
      # --no-pub: reuse the lockfile-enforced resolution from the step above
      # (analyze otherwise re-runs pub get without --enforce-lockfile).
      - name: Analyze
        run: fvm flutter analyze --no-pub --no-fatal-infos

  build-windows:
    # Skip the heavy compile on draft PRs; analyze still runs for fast feedback.
    needs: analyze
    if: ${{ !github.event.pull_request.draft }}
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Support long paths
        run: git config --system core.longpaths true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install fvm
        run: choco install fvm -y

      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v5
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/Pub/Cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      - name: Select Flutter version
        run: fvm use $env:FLUTTER_VERSION --force
        shell: pwsh

      - name: Write .env
        run: echo "KLIPY_API_KEY=" > .env
        shell: bash

      - name: Pub get
        run: fvm flutter pub get --enforce-lockfile
        shell: pwsh

      # Compile only — no msix/installer packaging (that's the release workflow).
      # --no-pub: reuse the lockfile-enforced resolution from the Pub get step.
      - name: Build Windows (unsigned)
        run: fvm flutter build windows --release --no-pub
        shell: pwsh

  build-linux:
    # Skip the heavy compile on draft PRs; analyze still runs for fast feedback.
    needs: analyze
    if: ${{ !github.event.pull_request.draft }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
          - runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libmpv-dev \
            libayatana-appindicator3-dev \
            libnotify-dev

      - name: Install fvm
        run: |
          curl -fsSL https://fvm.app/install.sh | bash
          echo "$HOME/fvm/bin" >> "$GITHUB_PATH"

      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v5
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ env.FLUTTER_VERSION }}

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      - name: Select Flutter version
        run: fvm use "$FLUTTER_VERSION" --force

      - name: Write .env
        run: echo "KLIPY_API_KEY=" > .env

      - name: Pub get
        run: fvm flutter pub get --enforce-lockfile

      # Compile only — no tarball packaging (that's the release workflow).
      # --no-pub: reuse the lockfile-enforced resolution from the Pub get step.
      - name: Build Linux (unsigned)
        run: fvm flutter build linux --release --no-pub
