name: Desktop Builds

on:
  push:
    tags:
      - "v*"
    # TEMP: remove after verifying the VirusTotal job — runs full builds on
    # every push to this branch.
    branches:
      - "joel/2.0/desktop/2.0.0.0"
  workflow_dispatch:

permissions:
  contents: write # attach artifacts to releases on tag builds

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install fvm
        run: choco install fvm -y

      # Keyed on the build script so a version bump in it invalidates the cache
      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v5
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('windows/build.ps1') }}

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/AppData/Local/Pub/Cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      # Inno Setup 6 and Rust (for super_native_extensions) are preinstalled
      # on the windows-latest runner image.
      - name: Build
        run: .\windows\build.ps1
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: bluebubbles-installer
          path: windows/bluebubbles_installer.exe

      - name: Upload debug symbols
        uses: actions/upload-artifact@v7
        with:
          name: bluebubbles-windows-symbols
          path: build/windows/symbols/

      # The msix is for the MS Store only — uploaded as its own run artifact
      # for easy download, never attached to releases.
      - name: Upload msix artifact
        uses: actions/upload-artifact@v7
        with:
          name: bluebubbles-msix
          path: windows/bluebubbles.msix

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: windows/bluebubbles_installer.exe

  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libmpv-dev \
            libayatana-appindicator3-dev \
            libnotify-dev

      - name: Install fvm
        run: |
          curl -fsSL https://fvm.app/install.sh | bash
          echo "$HOME/fvm/bin" >> "$GITHUB_PATH"

      # Keyed on the build script so a version bump in it invalidates the cache
      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v5
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('linux/build.sh') }}

      - name: Cache pub packages
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      - name: Build
        run: bash linux/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bluebubbles-linux-${{ matrix.arch }}
          path: bluebubbles-linux-${{ matrix.arch }}.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: bluebubbles-linux-${{ matrix.arch }}.tar.gz

  # Scans the user-facing downloads with VirusTotal and, on tag builds,
  # appends the analysis links to the release notes. The msix is not scanned —
  # it is MS Store-only, where Microsoft does its own vetting. Runs as a
  # single job after all builds so only one writer touches the release body.
  virustotal:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: VirusTotal scan
        id: virustotal
        if: env.VT_API_KEY != ''
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ env.VT_API_KEY }}
          files: |
            artifacts/bluebubbles-installer/bluebubbles_installer.exe
            artifacts/bluebubbles-linux-x86_64/bluebubbles-linux-x86_64.tar.gz
            artifacts/bluebubbles-linux-aarch64/bluebubbles-linux-aarch64.tar.gz

      # analysis output is comma-separated <filename>=<analysisURL> pairs.
      # The links go to the job summary on every run, and into vt_links.body
      # for the release append on tag builds.
      - name: Format scan links
        id: vt_links
        if: steps.virustotal.outputs.analysis != ''
        env:
          ANALYSIS: ${{ steps.virustotal.outputs.analysis }}
        run: |
          format_links() {
            echo '### VirusTotal scans'
            tr ',' '\n' <<< "$ANALYSIS" | while IFS='=' read -r file url; do
              echo "- [\`$(basename "$file")\`]($url)"
            done
          }
          format_links >> "$GITHUB_STEP_SUMMARY"
          {
            echo 'body<<VT_EOF'
            format_links
            echo 'VT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Append to release notes
        if: startsWith(github.ref, 'refs/tags/') && steps.vt_links.outputs.body != ''
        uses: softprops/action-gh-release@v3
        with:
          append_body: true
          body: ${{ steps.vt_links.outputs.body }}
