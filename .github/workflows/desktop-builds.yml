name: Desktop Builds

on:
  push:
    tags:
      - "v*"
    branches:
      - "joel/2.0/**" # TEMP: for testing the workflow; remove before merge
  workflow_dispatch:

permissions:
  contents: write # attach artifacts to releases on tag builds

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install fvm
        run: choco install fvm -y

      # Keyed on the build script so a version bump in it invalidates the cache
      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v4
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('windows/build.ps1') }}

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/Pub/Cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      # Inno Setup 6 and Rust (for super_native_extensions) are preinstalled
      # on the windows-latest runner image.
      - name: Build
        run: .\windows\build.ps1
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluebubbles-windows
          path: |
            windows/bluebubbles.msix
            windows/bluebubbles-windows.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/bluebubbles.msix
            windows/bluebubbles-windows.exe

  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libmpv-dev \
            libayatana-appindicator3-dev \
            libnotify-dev

      - name: Install fvm
        run: |
          curl -fsSL https://fvm.app/install.sh | bash
          echo "$HOME/fvm/bin" >> "$GITHUB_PATH"

      # Keyed on the build script so a version bump in it invalidates the cache
      - name: Cache Flutter SDK (fvm)
        uses: actions/cache@v4
        with:
          path: ~/fvm
          key: fvm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('linux/build.sh') }}

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pubspec.lock') }}

      - name: Build
        run: bash linux/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluebubbles-linux-${{ matrix.arch }}
          path: bluebubbles-linux-${{ matrix.arch }}.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bluebubbles-linux-${{ matrix.arch }}.tar.gz
